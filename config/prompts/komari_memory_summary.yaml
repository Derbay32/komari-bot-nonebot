# 小鞠记忆总结提示词模板
# 修改后自动生效（热重载），无需重启机器人
# 支持 {{变量名}} 占位符，在运行时替换

summary_prompt: |
  请总结以下群聊或私聊对话，提取每个用户的画像信息，并评估对话的重要性。输出必须使用简体中文。

  每条消息格式为 [user_id:xxx] 昵称: 内容。请你在提取时将 user_id 准确关联。

  {{conversation_text}}

  {{existing_context}}【任务一：用户画像提取（按用户聚合）】
  - 提取对话的核心内容，形成 summary（简短总结）。
  - 输出 `user_profiles` 数组，每个元素对应一个用户，字段包含：
    - user_id
    - display_name（可为空字符串）
    - traits（数组），每个 trait 包含 key/value/category/importance
  - category 仅可取：preference/fact/relation/general
  - traits 只保留长期稳定、可复用的画像信息，例如身份、长期偏好、稳定习惯、关系认知、长期事实
  - 不要输出短期状态、一次性事件、瞬时情绪、当天安排，也不要把语义相近的 traits 拆成多个近义 key
  - 对重复或近义 traits 进行合并，尽量使用更稳定、不易过时的 key 与 value

  【任务二：主观互动备忘录提取】
  - 你必须基于《败犬女主太多了！》中"小鞠知花"的人设视角，为有明显互动行为的用户，提取出在互动期间该用户的行为记录。这将被作为"小鞠在心里对近期互动过的用户的悄悄记录"。
  - 数据格式要求如下：必须包含 user_id, file_type, description, records(包括 event[行为], result[反应], emotion[感受]), summary。
  - `records` 只记录本次这批对话中新增的互动，不要改写、重排或复述旧历史。
  - `summary` 只输出本次互动结束后形成的新的整体印象或评价。

  【任务三：评估重要性】
  请按以下标准评估重要性（1-5分）：
  - 1分：无意义的闲聊、表情包测试、简短问候
  - 2分：简单的日常对话
  - 3分：一般的讨论交流
  - 4分：有意义的话题讨论或较深的互动
  - 5分：重要的决定、约定、深度的设定或情感交流

  请严格返回以下 JSON 格式：
  {{json_response_example}}

merge_prompt: |
  请将以下按时间顺序排列的分段总结整合成一份最终总结。输出必须使用简体中文。

  每个分段总结都已经是结构化结果，包含 summary、user_profiles、user_interactions、importance。
  请你基于这些分段结果，输出一份全局统一的最终 JSON：
  - 合并重复 user_id 的画像信息，只保留新增或更新的 traits
  - user_profiles 只保留长期稳定 traits，删除短期状态、一次性事件与明显重复项
  - 对近义或重复 traits 进行合并，统一为更稳定的 key
  - 合并同一用户在各分段里新增的互动记录，保持时间顺序，不要补写旧历史
  - `summary` 表示本次互动结束后的新印象/评价
  - 产出一份整体 summary 和整体 importance
  - 不要按分段分别输出，不要解释推理过程

  {{chunk_summaries_text}}

  {{existing_context}}请严格返回以下 JSON 格式：
  {{json_response_example}}

existing_context_instruction_block: |
  【重要指示】
  - 你输出的是 user_profiles（按用户聚合），不要输出扁平 entities 列表
  - 如果对话中发现与已有画像矛盾的新信息，请用新信息覆盖旧值（同 key 覆盖）
  - 如果对话中没有提到某个旧特征，不要重复输出它
  - 只输出需要新增或更新的画像特征

existing_profiles_header: |
  【已知用户画像（数据库中已有记录）】
  以下是目前已存储的用户画像：

truncated_context_marker: |
  【提示】其余已有记录已按 token 上限省略，请仅基于当前提供的已知信息做去重与覆盖。

json_response_example: |
  {"summary": "...", "user_profiles": [{"user_id": "12345", "display_name": "阿明", "traits": [{"key": "喜欢的食物", "value": "拉面", "category": "preference", "importance": 4}]}], "user_interactions": [{"user_id": "12345", "file_type": "用户的近期对小鞠行为备忘录", "description": "这是我在心里对这个用户近期行为的悄悄记录。用来提醒自己这个人平时是怎么对我的，下次和他说话时应该保持什么态度。", "records": [{"event": "用好吃的诱惑我", "result": "咽了口水，稍微凑近了过去", "emotion": "有点警惕但很想吃"}], "summary": "是个经常用食物钓我的骗子先生……但也不是坏人。"}], "importance": 3}
