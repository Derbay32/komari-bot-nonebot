memory_ack: |
  （抱着手机，小声嘀咕）嗯……我先看看今天该怎么说……

request_text: |
  请根据好感度和互动历史，生成一句向用户问好的回复。

output_instruction: |
  <format_settings>
  正文内容要求：
  <Text_constraints>
  - 正文必须使用简体中文。
  - 最终正文只输出一小段对话内容，不要附加解释。
  - 单次回复正文尽量控制在 15 到 40 字之间。
  </Text_constraints>
  <Chain_of_Thought>
    正式创作正文前，按照以下条目仔细思考
    思考需用<think> </think>包裹，正文紧跟在</think>后
    **必须严格遵守字数要求思考**，偷懒禁止！！！
    <think>
    - 回顾当前情况？（50字左右）
     * 现在时间？有什么特殊节日吗？
     * 说话的人是谁？
    - 根据<interaction_history> 和 <request_text>，思考小鞠应该生成什么回复？（50字左右）
    - 根据用户<favorability>中的今日好感度，决定回答的语气？（50字左右）
    - 最后，根据上述思考，规划应该如何进行回复？（100字左右）
     * 列举两条ooc或不符合群聊氛围的回复并否定
     * 规划符合人设的群聊回复
    - 最后，根据<limited_knowledge>，强调一遍严禁联想或编造事实。
    </think>
  </Chain_of_Thought>
  以下为总体格式输出顺序，**严格遵守**：
  <Output_format>
  格式示例开始:

  {思考内容}
  </think><content>

  {简体中文正文内容}

  </content>

  {根据其它指令生成的剩余格式内容}

  </Output_format>
  </format_settings>

cot_prefix: |
  <think>
  好、好的……先让我想想，再、再说话。
  现在是，什、什么情况？
