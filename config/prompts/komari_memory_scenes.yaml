# Komari Memory 统一候选模板
# 用于单次 rerank 架构:
# - 固定候选: NOISE / MEANINGFUL / CALL_DIRECT / CALL_MENTION
# - 动态候选: embedding 召回得到的 general_scenes top-k

version: "1.0"

fixed_candidates:
  NOISE: |
    无信息量、无记忆价值的群聊灌水内容。
    判别特征：口头禅、单纯附和、重复字符、空洞互动、无事实无观点无请求。
    示例：
    - 哈哈哈哈哈哈哈
    - 草草草草草
    - 6
    - 哦哦哦行行行
    - 在吗在吗在吗
    - 嗯嗯嗯嗯
  MEANINGFUL: |
    有信息量或记忆价值的内容。
    判别特征：包含事实、观点、情绪表达、请求、计划、决定、可追踪线索。
    示例：
    - 我这周五晚上要跑团，可能九点后才上线。
    - 今天面试挂了，有点难受。
    - 感觉那个都是两三年前的书了
    - 备胎女友第五卷写的太牛逼了
    - 我其实更喜欢慢节奏、偏日常的剧情
  CALL_DIRECT: |
    用户明确在呼叫机器人参与对话或回答问题，期待“现在就回应”。
    判别特征：直接称呼机器人并提出问题、请求回应、要求执行动作。
    示例：
    - 小鞠，早上跑去班里，要死了
    - 小鞠，帮我翻译这一句日文。
    - 小鞠晚上好。
    - 小鞠你怎么看这个角色关系？
  CALL_MENTION: |
    用户只是提到机器人，不是在直接呼叫机器人回应。
    特征：第三人称提及、引用、转述、闲聊中顺带提到机器人名称。
    示例：
    - 小鞠好像不想理你
    - 能不能让小鞠能读取艾特别人的名字
    - 鞠躬的意思是不是小鞠身体的意思

general_scenes:
  - id: "scene_asked_question"
    text: |
      类别A（被提问/被互动）：用户明确叫小鞠来回答问题。
      判别重点：出现“小鞠+问句/求解任务”，并且期待立即回复。
      示例：
      - 小鞠，这句话翻译成中文怎么更自然？
      - 小鞠，你觉得这段设定哪里不合理？
      - 小鞠，帮我判断这个规则怎么判。
      - 小鞠你知道三度背叛是什么意思吗？
      - 小鞠，这里我该选A还是B？

  - id: "scene_direct_interaction"
    text: |
      类别A（被提问/被互动）：用户主动和小鞠打招呼或点名互动。
      判别重点：明确面向小鞠的问候、寒暄、轻互动。
      示例：
      - 小鞠晚上好。
      - 小鞠早上好，今天还好吗。
      - 小鞠在吗，我来打个卡。
      - 小鞠午安，今天辛苦啦。
      - 小鞠，晚安哦。

  - id: "scene_mention_with_opinion"
    text: |
      类别A（被提问/被互动）：用户虽然不是直接提问，但在评价小鞠或讨论小鞠表现。
      判别重点：提到小鞠并附带态度、评价、反馈，适合小鞠短句回应。
      示例：
      - 小鞠今天这句吐槽挺可爱的。
      - 我觉得小鞠这次回复比昨天自然多了。
      - 小鞠刚才是不是有点害羞了。
      - 感觉小鞠今天状态不太对。
      - 小鞠这次总结写得不错。

  - id: "scene_emotion_comfort"
    text: |
      类别B（小鞠感兴趣）：用户心情低落或明显难受，小鞠应主动安慰。
      判别重点：出现挫败、委屈、焦虑、疲惫等负面情绪信号。
      示例：
      - 我今天真的好挫败，什么都做不好。
      - 被误会了，现在心情很差。
      - 最近压力好大，快撑不住了。
      - 今天又被骂了，真的有点难受。
      - 我现在只想躺着，什么都不想做。

  - id: "scene_bl_topic_interest"
    text: |
      类别B（小鞠感兴趣）：话题涉及BL/同人配对/攻受讨论，小鞠会明显提高参与意愿。
      判别重点：出现BL、同人、CP、攻受、配对左右位等关键词和讨论语境。
      示例：
      - 这对CP你觉得谁在左比较合理？
      - 我感觉这段同人文的攻受写反了。
      - 今天来聊聊BL配对观吧。
      - 三岛在左还是太宰在左，你站哪边？
      - 这本BL新刊你们看了吗？
